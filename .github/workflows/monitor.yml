name: Monitor Telecom Usage
on:
  workflow_dispatch:
  schedule:
    - cron: '0,30 * * * *'
permissions:
  contents: write
jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      TELECOM_USER: ${{ secrets.TELECOM_USER }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pycryptodome

      - name: Run monitor script
        run: python telecom_monitor.py

      - name: Commit and push usage.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add usage.json
          git commit -m "Update usage data" || echo "No changes to commit"
          git push

      - name: Sync usage.json to Gitee
        run: |
          # 获取 Gitee 上现有文件的 sha（更新文件时必须提供，新文件则为空）
          SHA=$(curl -s \
            "https://gitee.com/api/v5/repos/${{ secrets.GITEE_USERNAME }}/telecom-data/contents/usage.json?access_token=${{ secrets.GITEE_TOKEN }}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || echo "")

          # 将 usage.json 转为 base64
          CONTENT=$(base64 -w 0 usage.json)

          # 根据是否有 sha 决定用 POST（新建）还是 PUT（更新）
          if [ -z "$SHA" ]; then
            METHOD="POST"
            BODY="{\"access_token\":\"${{ secrets.GITEE_TOKEN }}\",\"message\":\"update usage.json\",\"content\":\"$CONTENT\"}"
          else
            METHOD="PUT"
            BODY="{\"access_token\":\"${{ secrets.GITEE_TOKEN }}\",\"message\":\"update usage.json\",\"content\":\"$CONTENT\",\"sha\":\"$SHA\"}"
          fi

          curl -s -X $METHOD \
            "https://gitee.com/api/v5/repos/${{ secrets.GITEE_USERNAME }}/telecom-data/contents/usage.json" \
            -H "Content-Type: application/json" \
            -d "$BODY"
